<!DOCTYPE html>
<html lang="nl-NL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pangram</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <script>

        const colorScheme = localStorage.getItem('color-scheme');

        let className = '';
        switch (colorScheme) {
            case 'dark':
                className = 'dark'
                break;
            case 'light':
                className = 'light'
                break;
        }

        if (className) document.documentElement.classList.add(className);
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Spelwijze</h1>
            <div class="settings">
                <button id="theme-toggle" class="theme-toggle-button" aria-label="Toggle theme">
                    <span id="theme-icon" class="icon"></span>
                </button>
                <button id="menu-button" class="menu-button" popovertarget="main-menu" aria-label="Open menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-menu icon"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <menu id="main-menu" popover role="menu">
                    <li role="menuitem" id="today-puzzle-menu-item">Vandaag</li>
                </menu>
            </div>
        </header>
        <main>
            <div id="game-container">
                <details id="guessed-words-container">
                    <summary>
                        <span id="recently-guessed-words-list"></span>
                        <span id="guessed-words-count">(0/0)</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="feather feather-chevron-down" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </summary>
                    <div id="guessed-words-list-wrapper">
                        <ul id="guessed-words-list"></ul>
                        <div id="reveal-container" style="display: none;">
                            <div class="reveal-buttons">
                                <button id="show-solution-btn">Oplossing</button>
                                <button id="hide-solution-btn" style="display: none;" disabled>Verberg oplossing</button>
                            </div>
                            <ul id="unguessed-words-list" style="display: none;"></ul>
                        </div>

                </details>
                <div id="score-container">
                    <p>Score: <span id="score">0</span>/<span id="max-score">0</span> (<span id="level"></span>)</p>
                </div>
                <div class="game-area">
                    <input type="text" id="word-input" class="form-input" placeholder="Vul een woord in" autofocus inputmode="none" />
                    <div class="letter-grid">
                        <div class="row">
                            <button class="letter-key">a</button>
                            <button class="letter-key">e</button>
                        </div>
                        <div class="row">
                            <button class="letter-key">g</button>
                            <button class="letter-key center-key" id="center-key">w</button>
                            <button class="letter-key">r</button>
                        </div>
                        <div class="row">
                            <button class="letter-key">n</button>
                            <button class="letter-key">z</button>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn" id="backspace-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-delete icon"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
                        </button>
                        <button class="action-btn" id="shuffle-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-shuffle icon"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                        </button>
                        <button class="action-btn primary" id="submit-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-corner-down-left icon"><polyline points="9 10 4 15 9 20"></polyline><path d="M20 4v7a4 4 0 0 1-4 4H4"></path></svg>
                        </button>
                        <button class="action-btn" id="copy-stats-btn" aria-label="Copy Stats" style="grid-column:2/3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-copy icon"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                    <pre id="stats-output" aria-live="polite"></pre>
                </div>
            </div>
        </main>
    </div>
    <script src="theme-toggle.js" type="module"></script>
    <script src="script.js" type="module"></script>
</body>
</html>
